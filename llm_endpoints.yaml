# -----------------------------------------------------------------------------
# Roles: map logical roles to endpoint names
#
# semantic_audit: compares generated SQL columns against the user's request.
#   Default: openai-gpt4o-mini (direct OpenAI, $0.15/1M input)
# -----------------------------------------------------------------------------
roles:
  default:
    semantic_audit: openai-gpt4o-mini
