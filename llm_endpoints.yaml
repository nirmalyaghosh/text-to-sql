# =============================================================================
# LLM Endpoints Configuration
# =============================================================================
# Secrets: referenced via api_key_env, resolved from environment variables.
# Never commit actual keys. Use .env or your secrets manager.
#
# PRICING POLICY:
#   All pricing_url values MUST point to first-party official pages only.
#   No aggregators, no third-party calculators.
#   pricing_checked is the date the numbers were last verified against
#   that URL in a browser. Re-verify when pricing_checked > 30 days old.
#   All rates in USD per 1M tokens.
#
# CONTEXT WINDOW:
#   context_window is the model's maximum input context in tokens.
#   Source URL is cited in an inline comment. Where sources conflict,
#   the lower value is used and the conflict is noted.
#
# Usage: load with llm_config.py -> validated EndpointConfig objects
# =============================================================================

# -----------------------------------------------------------------------------
# Defaults: inherited by all endpoints unless overridden
# -----------------------------------------------------------------------------
defaults:
  timeout_seconds: 60
  max_retries: 3
  retry_backoff_factor: 2.0

# -----------------------------------------------------------------------------
# Endpoints
# -----------------------------------------------------------------------------
endpoints:

  # ---------------------------------------------------------------------------
  # OpenAI (direct)
  # Source: https://openai.com/api/pricing/
  # ---------------------------------------------------------------------------
  openai-gpt4o-mini:
    provider: openai
    model: gpt-4o-mini
    api_key_env: OPENAI_API_KEY
    context_window: 128000  # https://platform.openai.com/docs/models/gpt-4o-mini
    cost:
      input_per_1m: 0.15
      output_per_1m: 0.60
      pricing_url: https://openai.com/api/pricing/
      pricing_checked: "2026-03-21"

  # ---------------------------------------------------------------------------
  # OpenRouter
  # Source: https://openrouter.ai/models
  #
  # OpenRouter proxies multiple providers via a single OpenAI-compatible API.
  # ---------------------------------------------------------------------------
  openrouter-gpt4o-mini:
    provider: openrouter
    model: openai/gpt-4o-mini
    api_key_env: OPENROUTER_API_KEY
    context_window: 128000  # https://platform.openai.com/docs/models/gpt-4o-mini
    base_url: https://openrouter.ai/api/v1
    cost:
      input_per_1m: 0.15
      output_per_1m: 0.60
      pricing_url: https://openrouter.ai/models/openai/gpt-4o-mini
      pricing_checked: "2026-04-03"

  openrouter-qwen3.5-9b:
    provider: openrouter
    model: qwen/qwen3.5-9b
    api_key_env: OPENROUTER_API_KEY
    context_window: 256000  # https://huggingface.co/Qwen/Qwen3.5-9B
    base_url: https://openrouter.ai/api/v1
    cost:
      input_per_1m: 0.05
      output_per_1m: 0.15
      pricing_url: https://openrouter.ai/models/qwen/qwen3.5-9b
      pricing_checked: "2026-03-30"
    notes: >
      Qwen 3.5 9B via OpenRouter. Used for semantic output audit
      and as adversarial eval pipeline model (R07, R09, R12).

